<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sonido Limpieza</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            text-align: center;
            width: 320px;
        }

        h1 {
            margin-top: 0;
            font-size: 1.4rem;
            margin-bottom: 24px;
        }

        button {
            border: none;
            padding: 14px 20px;
            margin: 8px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.92;
        }

        .play {
            background: #22c55e;
            color: white;
        }

        .pause {
            background: #f59e0b;
            color: white;
        }

        .stop {
            background: #ef4444;
            color: white;
        }

        .progress-container {
            margin-top: 20px;
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, #06b6d4);
            transition: width 0.2s linear;
        }

        #progressText {
            margin-top: 8px;
            font-size: 0.9rem;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Herramienta de Limpieza de Audio</h1>
        <audio id="audio" src="Limpieza de Audio iphone.mp3"></audio>

        <button class="play" onclick="document.getElementById('audio').play()">
            ▶ Sonido Limpieza
        </button>

        <button class="pause" onclick="pauseAudio()">
            ⏸ Pausa
        </button>

        <button class="stop" onclick="stopAudio()">
            ■ Stop
        </button>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div id="progressText">0%</div>
    </div>

    <script>
        function pauseAudio() {
            document.getElementById('audio').pause();
        }

        function stopAudio() {
            const audio = document.getElementById('audio');
            audio.pause();
            audio.currentTime = 0;
            updateProgress();
        }

        const audio = document.getElementById('audio');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        audio.addEventListener('timeupdate', updateProgress);

        function updateProgress() {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + '%';
            progressText.textContent = Math.round(percent) + '%';
        }
    </script>
</body>

</html>
